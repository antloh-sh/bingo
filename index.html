<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bingo App</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar for Controls and History */
    .sidebar {
      width: 220px;
      background: #2684ff;
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      z-index: 10;
    }

    .bingo-title {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 20px;
      border-bottom: 2px solid rgba(255,255,255,0.3);
      width: 100%;
      text-align: center;
      padding-bottom: 10px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      background: #fff;
      color: #2684ff;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.2s;
    }
    .btn:hover { background: #e0e0e0; }

    /* Vertical History Display */
    .history-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .history-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.9);
    }

    .number-box {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: bold;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
    }

    .num-current {
      width: 110px;
      height: 110px;
      background: #4cd964;
      color: white;
      font-size: 3.5rem;
      border-color: #fff;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      margin-bottom: 10px;
    }

    /* Side-by-Side Gameplay Area */
    .gameplay-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-evenly;
      padding: 20px;
      gap: 20px;
    }

    .wheel-container { 
      position: relative;
      flex: 0 0 auto; 
    }

    /* Fixed Arrow Pointer */
    .wheel-pointer {
      position: absolute;
      right: -25px;
      top: 50%;
      transform: translateY(-50%);
      width: 0; 
      height: 0; 
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      border-right: 40px solid #788295;
      z-index: 5;
    }

    .wheel-canvas { 
      cursor: pointer; 
      max-height: 85vh; 
      max-width: 45vw; 
      background: #f3f7fa;
      border-radius: 50%;
    }

    .table-container {
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .bingo-table { border-collapse: collapse; }
    .bingo-table th, .bingo-table td {
      border: 1px solid #dee5ed;
      padding: 5px 12px;
      text-align: center;
      font-size: 1.1rem;
    }
    .bingo-table th { background: #2684ff; color: white; }
    .highlighted { background: #ffd870 !important; }
    .last-highlighted { background: #4cd964 !important; color: white !important; font-weight: bold; }

    /* Modal Styling */
    .modal-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: #fff;
      padding: 60px;
      border-radius: 30px;
      border: 8px solid #ffd870;
      text-align: center;
    }
    .modal h2 { font-size: 10rem; margin: 0; color: #174bb2; }

    .hint-text { font-size: 0.75rem; margin-top: auto; text-align: center; opacity: 0.8; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="bingo-title">BINGO</div>
    <button id="newGameBtn" class="btn">New Game</button>
    
    <div class="history-container">
      <span class="history-label" style="color: #fff; font-weight: bold;">Current</span>
      <div id="hist-0" class="number-box num-current">-</div>
      <span class="history-label">Previous</span>
      <div id="hist-1" class="number-box">-</div>
      <div id="hist-2" class="number-box">-</div>
    </div>
    <p class="hint-text">Click the center logo to spin!</p>
  </div>

  <div class="gameplay-area">
    <div class="wheel-container">
      <div class="wheel-pointer"></div>
      <canvas id="wheel" width="480" height="480" class="wheel-canvas"></canvas>
    </div>
    <div class="table-container">
      <table id="bingoTable" class="bingo-table"></table>
    </div>
  </div>

  <div id="modal-bg" class="modal-bg">
    <div class="modal"><h2 id="modal-number"></h2></div>
  </div>

  <audio id="blip" src="blip.wav" preload="auto"></audio>
  <audio id="bell" src="bell.wav" preload="auto"></audio>

  <script>
    // Original Logic: Number and Label Generation
    const wheelLabels = [];
    for (let i = 1; i <= 75; i++) {
      let letter = i <= 15 ? 'B' : i <= 30 ? 'I' : i <= 45 ? 'N' : i <= 60 ? 'G' : 'O';
      wheelLabels.push(`${letter}${i}`);
    }

    const wheelCanvas = document.getElementById('wheel');
    const ctx = wheelCanvas.getContext('2d');
    const center = { x: wheelCanvas.width / 2, y: wheelCanvas.height / 2 };
    const radius = 210;
    const logoRadius = 80;

    let remainingNumbers = [...wheelLabels];
    let pickedNumbers = [];
    let highlightedNumbers = [];
    let spinning = false;
    let spinStart = null;
    let spinDuration = 0;
    let startAngle = 0;
    let currentWheelAngle = 0;
    let lastDrawnNumber = null;
    let winnerIndex = null;
    let lastPlayedSlice = null;

    const blipAudio = document.getElementById('blip');
    const bellAudio = document.getElementById('bell');
    const logoImg = new window.Image();
    logoImg.src = "logo.png";
    let logoLoaded = false;
    logoImg.onload = () => { logoLoaded = true; drawWheel(currentWheelAngle); };

    function updateSidebarHistory() {
      const reversed = [...pickedNumbers].reverse();
      document.getElementById('hist-0').textContent = reversed[0] || '-';
      document.getElementById('hist-1').textContent = reversed[1] || '-';
      document.getElementById('hist-2').textContent = reversed[2] || '-';
    }

    function drawTable() {
      const table = document.getElementById('bingoTable');
      table.innerHTML = '';
      const thead = document.createElement('thead');
      const trH = document.createElement('tr');
      ['B', 'I', 'N', 'G', 'O'].forEach(l => {
        const th = document.createElement('th'); th.textContent = l; trH.appendChild(th);
      });
      thead.appendChild(trH); table.appendChild(thead);

      const tbody = document.createElement('tbody');
      for (let row = 0; row < 15; row++) {
        const tr = document.createElement('tr');
        for (let col = 0; col < 5; col++) {
          const num = col * 15 + row + 1;
          const td = document.createElement('td');
          td.textContent = num;
          if (highlightedNumbers.includes(num)) {
            td.classList.add(lastDrawnNumber === num ? 'last-highlighted' : 'highlighted');
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
    }

    function drawWheel(angle = 0, highlightIndex = null) {
      ctx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
      const sliceAngle = (2 * Math.PI) / remainingNumbers.length;
      for (let i = 0; i < remainingNumbers.length; i++) {
        const a0 = angle + i * sliceAngle;
        const a1 = a0 + sliceAngle;
        ctx.beginPath(); ctx.moveTo(center.x, center.y);
        ctx.arc(center.x, center.y, radius, a0, a1, false);
        ctx.fillStyle = (i % 2 === 0) ? '#f7f7f7' : '#e0e0e0';
        if (highlightIndex !== null && i === highlightIndex) ctx.fillStyle = '#ffd870';
        ctx.fill(); ctx.strokeStyle = '#b9cbdf'; ctx.stroke();
        ctx.save(); ctx.translate(center.x, center.y); ctx.rotate(a0 + sliceAngle / 2);
        ctx.textAlign = 'center'; ctx.font = '11px Segoe UI'; ctx.fillStyle = '#2684ff';
        ctx.fillText(remainingNumbers[i], radius - 15, 4); ctx.restore();
      }
      ctx.save(); ctx.translate(center.x, center.y); ctx.rotate(angle);
      ctx.beginPath(); ctx.arc(0, 0, logoRadius - 4, 0, 2 * Math.PI); ctx.clip();
      if (logoLoaded) ctx.drawImage(logoImg, -(logoRadius - 4), -(logoRadius - 4), (logoRadius - 4) * 2, (logoRadius - 4) * 2);
      ctx.restore();
      ctx.beginPath(); ctx.arc(center.x, center.y, logoRadius, 0, 2 * Math.PI);
      ctx.strokeStyle = '#2684ff'; ctx.lineWidth = 4; ctx.stroke();
    }

    function startSpin() {
      if (spinning || remainingNumbers.length === 0) return;
      spinning = true;
      spinStart = performance.now();
      // Original Logic: Random duration
      spinDuration = 5000 + Math.random() * 2000;
      startAngle = currentWheelAngle;
      lastPlayedSlice = null;
      animateSpin();
    }

    function animateSpin() {
      const now = performance.now();
      const elapsed = now - spinStart;
      // Original Logic: RPM-based total rotations for smooth deceleration
      const totalRotations = 2 * (spinDuration / 1000); 
      const t = Math.min(elapsed / spinDuration, 1);
      const ease = 1 - Math.pow(1 - t, 3); // Original cubic ease-out
      const spinAngle = startAngle + (totalRotations * 2 * Math.PI * ease);
      
      // Fixed: Calculating winner index at the 3 o'clock pointer position
      const pointerAngle = (0 - spinAngle + 2 * Math.PI) % (2 * Math.PI);
      const sliceAngle = (2 * Math.PI) / remainingNumbers.length;
      let idx = Math.floor(pointerAngle / sliceAngle) % remainingNumbers.length;
      if (idx < 0) idx += remainingNumbers.length;

      // Original Logic: Ticking sound when crossing slices
      if (lastPlayedSlice !== null && idx !== lastPlayedSlice) {
        try { blipAudio.currentTime = 0; blipAudio.play(); } catch(e){}
      }
      lastPlayedSlice = idx;
      drawWheel(spinAngle);

      if (t < 1) {
        requestAnimationFrame(animateSpin);
      } else {
        currentWheelAngle = spinAngle % (2 * Math.PI);
        winnerIndex = idx;
        const winnerLabel = remainingNumbers[winnerIndex];
        drawWheel(currentWheelAngle, winnerIndex);
        
        setTimeout(() => {
          document.getElementById('modal-number').textContent = winnerLabel;
          document.getElementById('modal-bg').style.display = 'flex';
          try { bellAudio.play(); } catch(e){}
          setTimeout(() => {
            document.getElementById('modal-bg').style.display = 'none';
            pickNumber(winnerLabel);
            spinning = false;
          }, 4000);
        }, 500);
      }
    }

    function pickNumber(label) {
      pickedNumbers.push(label);
      const num = parseInt(label.slice(1));
      highlightedNumbers.push(num);
      lastDrawnNumber = num;
      remainingNumbers.splice(winnerIndex, 1);
      drawTable(); updateSidebarHistory(); drawWheel(currentWheelAngle);
      // Original Logic: State persistence
      localStorage.setItem('bingoGameState_v5', JSON.stringify({ remainingNumbers, pickedNumbers, highlightedNumbers, currentWheelAngle, lastDrawnNumber }));
    }

    function resetGame() {
      remainingNumbers = [...wheelLabels]; pickedNumbers = []; highlightedNumbers = [];
      lastDrawnNumber = null; currentWheelAngle = 0;
      drawTable(); updateSidebarHistory(); drawWheel(0);
      localStorage.removeItem('bingoGameState_v5');
    }

    wheelCanvas.addEventListener('click', (e) => {
      const rect = wheelCanvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (wheelCanvas.width / rect.width) - center.x;
      const y = (e.clientY - rect.top) * (wheelCanvas.height / rect.height) - center.y;
      if (Math.sqrt(x*x + y*y) <= logoRadius) startSpin();
    });

    document.getElementById('newGameBtn').addEventListener('click', () => { if(confirm('Reset game?')) resetGame(); });

    // Initial Load and State Recovery
    const saved = localStorage.getItem('bingoGameState_v5');
    if (saved) {
      const s = JSON.parse(saved);
      remainingNumbers = s.remainingNumbers; pickedNumbers = s.pickedNumbers; 
      highlightedNumbers = s.highlightedNumbers; currentWheelAngle = s.currentWheelAngle; 
      lastDrawnNumber = s.lastDrawnNumber;
    }
    drawTable(); updateSidebarHistory(); drawWheel(currentWheelAngle);
  </script>
</body>
</html>
